version: "3.8"

services:

  mariadb:
    image: mariadb:11
    
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: messaging_app
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:                         
    build: ./frontend
    
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: .
    
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mariadb:3306/messaging_app
      SKIP_DB_INIT: "0"
    ports:
      - "8000:8000"

volumes:
  mariadb_data: